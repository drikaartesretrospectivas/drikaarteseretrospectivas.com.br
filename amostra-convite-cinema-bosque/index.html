<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Amostra Cinema Bosque</title>
    <meta property="og:title" content="Amostra Cinema Bosque">
    <meta property="og:description" content="Você recebeu um convite especial! Clique para abrir.">
    <meta property="og:type" content="website">
    <meta name="twitter:title" content="Amostra Cinema Bosque">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; overflow:hidden; height:100dvh; display:flex; justify-content:center; align-items:center; font-family:sans-serif; }
        .page { display:none; width:100%; height:100%; position:absolute; max-width:500px; opacity:0; transition:opacity 0.6s; }
        .active { display:flex; opacity:1; }
        img, video { width:100%; height:100%; object-fit:contain; }
        .hotspot { position:absolute; transform:translate(-50%, -50%); z-index:100; border-radius:50%; }
        #btn-s { position:fixed; bottom:30px; left:20px; width:45px; height:45px; background:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.6); border-radius:50%; z-index:999; display:none; justify-content:center; align-items:center; color:white; backdrop-filter:blur(5px); }
        #skip { position:fixed; bottom:30px; right:20px; z-index:999; padding:10px 20px; border-radius:20px; background:rgba(0,0,0,0.6); color:#c9a96e; display:none; border:1px solid #c9a96e; font-size:10px; text-transform:uppercase; letter-spacing:1px; }
        
        /* CRONÔMETRO AMPLIADO */
        #timer { position:absolute; top:12%; width:100%; color:white; text-align:center; z-index:200; display:none; flex-direction:column; text-shadow:2px 2px 5px #000; pointer-events:none; }
        .t-num { display:inline-block; margin:0 8px; font-size:2.2rem; font-weight:bold; }
        .t-lab { display:block; font-size:0.7rem; opacity:0.9; letter-spacing:1px; margin-top:-2px; }
    </style>
</head>
<body>
<audio id="m" src="audio.mp3" loop></audio>
<button id="btn-s" onclick="t()">II</button>
<button id="skip" onclick="g(3)">PULAR</button>

<div id="timer">
    <p style="font-size:1.1rem; margin-bottom:10px; font-weight:bold; letter-spacing:1px;">Nossa diversão começa em:</p>
    <div>
        <div class="t-num"><span id="d">00</span><span class="t-lab">DIAS</span></div>
        <div class="t-num"><span id="h">00</span><span class="t-lab">HORAS</span></div>
        <div class="t-num"><span id="mi">00</span><span class="t-lab">MIN</span></div>
        <div class="t-num"><span id="se">00</span><span class="t-lab">SEG</span></div>
    </div>
</div>

<div class="page active" id="pg1" onclick="s()"><img src="pagina1.jpg"></div>
<div class="page" id="pg2"><video id="v2" src="pagina2.mp4" playsinline></video></div>
<div class="page" id="pg3"><img src="pagina3.jpg"><a href="https://maps.app.goo.gl/XfzYKQNsEa5zVQaW9" target="_blank" class="hotspot" style="top:63.45%; left:32.29%; width:15.69%; height:15.69%;"></a>
<a href="https://wa.me/5511950673897?text=Confirmar%20presen%C3%A7a" target="_blank" class="hotspot" style="top:63.38%; left:51.16%; width:14.71%; height:14.71%;"></a>
<div class="hotspot" onclick="g(4)" style="top:63.72%; left:69.06%; width:14.58%; height:14.58%;"></div>
</div>
<div class="page" id="pg4" onclick="rv()"><img src="pagina 4.jpg"></div>



<script>
    const mu=document.getElementById('m'), btn=document.getElementById('btn-s'), sk=document.getElementById('skip'), tm=document.getElementById('timer');
    const hasP3 = true;
    let lastPg = 1;
    const uSk = "nao", uCr = "nao", pgCr = "3", dtCr = "";
    
    function s(){ mu.play().catch(()=>{}); btn.style.display='flex'; if(uSk==='sim' && hasP3) sk.style.display='block'; g(2); const v2=document.getElementById('v2'); if(v2 && v2.tagName==='VIDEO'){v2.play(); v2.onended=()=> { if(hasP3) g(3); } } else { if(hasP3) setTimeout(()=>g(3),4000); } }
    
    function g(n){ 
        if(n < 4) lastPg = n;
        document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active'); p.style.display='none';});
        if(n==3 || (!hasP3 && n==2)) sk.style.display='none';
        tm.style.display = (uCr==='sim' && n==pgCr) ? 'flex' : 'none';
        const t=document.getElementById('pg'+n); if(t){t.style.display='flex'; setTimeout(()=>t.classList.add('active'),50); const v=t.querySelector('video'); if(v)v.play();}
    }
    
    function rv(){ g(lastPg); }

    function t(){ mu.paused ? mu.play() : mu.pause(); }
    if(uCr==='sim'){ setInterval(()=>{ const dist=new Date(dtCr)-new Date(); if(dist<0)return;
        document.getElementById('d').innerText=Math.floor(dist/86400000).toString().padStart(2,'0');
        document.getElementById('h').innerText=Math.floor((dist%86400000)/3600000).toString().padStart(2,'0');
        document.getElementById('mi').innerText=Math.floor((dist%3600000)/60000).toString().padStart(2,'0');
        document.getElementById('se').innerText=Math.floor((dist%60000)/1000).toString().padStart(2,'0');
    },1000); }
</script></body></html>
