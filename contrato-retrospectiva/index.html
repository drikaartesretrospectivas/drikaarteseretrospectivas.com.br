</div><script>
    const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); ctx.lineWidth = 3; let drawing = false;
    function getPos(e) { const r = canvas.getBoundingClientRect(); const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left; const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top; return {x, y}; }
    canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
    canvas.onmousemove = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
    canvas.onmouseup = () => drawing = false;
    canvas.ontouchstart = (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
    canvas.ontouchmove = (e) => { e.preventDefault(); if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
    canvas.ontouchend = () => drawing = false;
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    async function gerarPDF() {
        if(!document.getElementById('aceite').checked) { alert('Marque o aceite!'); return; }
        const res = await fetch('https://api.ipify.org?format=json');
        const ip = (await res.json()).ip;
        const hash = Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(document.getElementById('nome').value + ip)))).map(b => b.toString(16).padStart(2, '0')).join('');
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.addImage("https://res.cloudinary.com/dlbft9sjz/image/upload/q_auto/f_auto/v1781548906/LOGO_PRINCIPAL_afltnu.png", 'PNG', 80, 10, 50, 20);
        
        // DADOS DO CLIENTE EXATOS
        doc.setFontSize(10);
        doc.text("DADOS DO CLIENTE", 10, 40);
        doc.text("Nome: " + document.getElementById('nome').value, 10, 45);
        doc.text("Email: " + document.getElementById('email').value, 10, 50);
        doc.text("WhatsApp: " + document.getElementById('whatsInput').value, 10, 55);
        doc.text("Data: " + document.getElementById('dataEvento').value, 10, 60);
        doc.text("Tema: " + document.getElementById('tema').value, 10, 65);
        doc.text("Aceite: Cliente assinou e concordou com as regras.", 10, 70);
        doc.text("IP: " + ip, 10, 75);
        doc.text("Hash: " + hash.substring(0,20) + "...", 10, 80);
        
        // TERMOS COMPLETOS
        let y = 90;
        doc.splitTextToSize(document.getElementById('termosArea').value, 180).forEach(l => { 
            if(y > 270) { doc.addPage(); y = 20; }
            doc.text(l, 10, y); 
            y += 5; 
        });
        
        doc.addImage(canvas.toDataURL(), 'PNG', 10, y + 10, 50, 20);
        // Rodapé Fixo
        doc.setFontSize(8);
        doc.text("Drika Artes Retrospectiva - Adriana contato (55)1195067-3897", 105, 290, {align: 'center'});
        doc.save('Contrato.pdf');

        // MENSAGEM WHATSAPP EXATA
        const msg = `*CONTRATO ASSINADO*%0A%0ADADOS DO CLIENTE%0ANome: ${document.getElementById('nome').value}%0AEmail: ${document.getElementById('email').value}%0AWhatsApp: ${document.getElementById('whatsInput').value}%0AData: ${document.getElementById('dataEvento').value}%0ATema: ${document.getElementById('tema').value}%0AAceite: Cliente assinou e concordou com as regras.%0AIP: ${ip}%0AHash: ${hash.substring(0,20)}...%0A%0ADeclaro que li e concordo com Termos aceitos (1-16)`;
        window.open('https://wa.me/5511950673897?text=' + msg);
    }
</script>
