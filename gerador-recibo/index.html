<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamento</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
    label { display:block; margin-top:10px; font-weight:bold; }
    input, textarea { width:100%; padding:8px; box-sizing:border-box; }
    button { margin-top:15px; padding:10px 16px; }
    #orcamento { margin-top:30px; border:1px solid #ccc; padding:20px; }
    #logoPreview { max-height:80px; margin-top:10px; display:none; }
    .logo-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:15px; }
    .logo-header img { max-height:70px; max-width:200px; }
  </style>
</head>
<body>
  <h1>Gerador de Orçamento</h1>

  <label>Logo (opcional)</label>
  <input id="logo" type="file" accept="image/*" onchange="carregarLogo(event)">
  <img id="logoPreview" alt="Prévia da logo">

  <label>Cliente</label><input id="nome">
  <label>Telefone</label><input id="telefone">
  <label>E-mail</label><input id="email" type="email">
  <label>Serviço</label><input id="servico">
  <label>Descrição</label><textarea id="descricao"></textarea>
  <label>Valor Total (R$)</label><input id="total" type="number" step="0.01">
  <label>Data</label><input id="data" type="date">
  <button onclick="gerar()">Gerar Orçamento</button>
  <button onclick="baixarPDF()">Baixar PDF</button>
  <div id="orcamento"></div>

  <script>
    let logoBase64 = null;

    data.valueAsDate = new Date();

    function brl(v){
      return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    }

    function carregarLogo(event){
      const file = event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        logoBase64 = e.target.result;
        const preview = document.getElementById('logoPreview');
        preview.src = logoBase64;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function gerar(){
      const logoHtml = logoBase64
        ? `<img src="${logoBase64}" alt="Logo">`
        : '';

      orcamento.innerHTML = `
        <div class="logo-header">
          <h2>ORÇAMENTO</h2>
          ${logoHtml}
        </div>
        <p><strong>Data:</strong> ${data.value}</p>
        <p><strong>Cliente:</strong> ${nome.value}</p>
        <p><strong>Telefone:</strong> ${telefone.value}</p>
        <p><strong>E-mail:</strong> ${email.value}</p>
        <p><strong>Serviço:</strong> ${servico.value}</p>
        <p><strong>Descrição:</strong> ${descricao.value}</p>
        <p><strong>Total:</strong> ${brl(total.value)}</p>
        <hr>
        <small>Este documento é uma proposta comercial e não constitui comprovante de pagamento.</small>
      `;
    }

    function baixarPDF(){
      html2pdf().from(document.getElementById('orcamento'))
        .set({filename:'orcamento.pdf'})
        .save();
    }
  </script>
</body>
</html>
