<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Convite Karoline e Wiliam</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            width: 100%;
            height: 100dvh; /* Altura dinâmica para Safari/Android */
        }

        /* Botão de Som Flutuante */
        #audio-control {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 50%;
            color: #fff;
            display: none; /* Aparece após o start */
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;
        }

        #audio-control:active {
            transform: scale(0.9);
        }

        .page {
            display: none;
            width: 100%;
            height: 100dvh;
            position: relative;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Container que mantém a proporção da arte */
        .media-wrapper {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 500px; /* Limite opcional para telas muito largas */
            margin: 0 auto;
        }

        .media-wrapper img,
        .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a arte não corte */
        }

        /* BOTÕES (HOTSPOTS) RELATIVOS */
        .footer-center-group {
            position: absolute;
            bottom: 34%; /* Ajuste conforme a posição na sua imagem */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
            width: 100%;
            justify-content: center;
        }

        .hotspot {
            cursor: pointer;
            width: 65px;      
            height: 65px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0); /* Mude para 0.3 para testar posicionamento */
        }

        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 5;
        }
    </style>
</head>

<body>

<audio id="musica" src="audio.mp3" loop></audio>

<div id="audio-control" onclick="toggleAudio()">
    <span id="audio-icon">||</span>
</div>

<div class="page" id="page1" style="display:flex;">
    <div class="media-wrapper">
        <img src="pagina1.jpg" alt="Capa">
        <div class="click-overlay" onclick="startInvite()"></div>
    </div>
</div>

<div class="page" id="page2">
    <div class="media-wrapper">
        <video id="video" src="pagina2.mp4" playsinline webkit-playsinline></video>
    </div>
</div>

<div class="page" id="page3">
    <div class="media-wrapper">
        <img src="pagina3.jpg" alt="Convite">
        <div class="footer-center-group">
            <a href="https://maps.app.goo.gl/qJ2nne411ixmiFt79?g_st=ac" class="hotspot"></a>
           <a href="https://docs.google.com/forms/d/e/1FAIpQLScT7IoauUIqPxeudbc1Ay2NMH-CcozlbhlGtaT9_q8Frm2Qcg/viewform?usp=publish-editor"_blank" class="hotspot"></a>
        </div>
    </div>
</div>

<script>
const musica = document.getElementById('musica');
const video = document.getElementById('video');
const audioBtn = document.getElementById('audio-control');
const audioIcon = document.getElementById('audio-icon');

function startInvite() {
    // Exibe o botão de áudio
    audioBtn.style.display = 'flex';
    
    // Tenta iniciar música
    musica.play().catch(e => console.log("Erro ao tocar música", e));
    
    goPage(2);
    
    // Tenta iniciar vídeo (iOS requer playsinline)
    video.play().catch(error => {
        console.log("Auto-play vídeo bloqueado, tentando mudo.");
        video.muted = true;
        video.play();
    });

    video.onended = () => {
        goPage(3);
    };
}

function toggleAudio() {
    if (musica.paused) {
        musica.play();
        audioIcon.innerText = "||";
    } else {
        musica.pause();
        audioIcon.innerText = "▶";
    }
}

function goPage(num) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    const target = document.getElementById('page' + num);
    if (target) target.style.display = 'flex';
}

// Bloqueio de clique direito
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
    <style>
  #skip-btn {
    position:fixed; bottom:calc(28px + env(safe-area-inset-bottom,0px)); right:calc(20px + env(safe-area-inset-right,0px));
    z-index:40; height:46px; padding:0 18px; border-radius:23px;
    border:1.5px solid rgba(201,169,110,.45); background:rgba(8,8,8,.65);
    color:var(--gold-light); display:none; align-items:center; justify-content:center;
    cursor:pointer; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.2em; text-transform:uppercase;
    transition:transform .1s; -webkit-tap-highlight-color:transparent;
  }
  #skip-btn:active { transform:scale(.88); }
</style>

<button id="skip-btn">Pular</button>

<script>
  // ✏️ EDITE AQUI — coloque o nome da página final
  const PAGINA_FINAL = 'pagina3.jpg';

  const skipBtn = document.getElementById('skip-btn');
  overlay.addEventListener('click', () => { skipBtn.style.display = 'flex'; });
  skipBtn.addEventListener('click', () => {
    cancelAnimationFrame(kbRafId);
    clearTimeout(sceneTimer);
    document.getElementById('final-page').querySelector('.bg-img').src = PAGINA_FINAL;
    showFinalPage();
    skipBtn.style.display = 'none';
  });
</script>

</body>
</html>
