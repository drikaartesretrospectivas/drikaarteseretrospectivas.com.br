<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Convite Ana Luisa</title>
    
    <style>
        :root { --cor-botao: #ffffff; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
        }

        .page {
            display: none;
            width: 100%;
            height: 100dvh;
            position: absolute; /* Mudado para absolute para sobrepor */
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 500px;
        }

        .page img, .page video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Garante que preencha tudo sem bordas */
            display: block;
        }

        /* Botão de áudio */
        .btn-audio {
            position: fixed;
            top: 30px; 
            left: 20px; 
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.4); 
            border: 2px solid var(--cor-botao);
            color: var(--cor-botao);
            display: none; 
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            animation: pulse-white 2s infinite;
        }

        @keyframes pulse-white {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .hotspot { position: absolute; cursor: pointer; z-index: 10; }
        .btn-voltar { position: absolute; top: 5%; right: 5%; width: 12%; aspect-ratio: 1/1; z-index: 20; }
    </style>
</head>

<body>

<audio id="musica" src="audio.mp3" loop preload="auto"></audio>

<div id="btnControleAudio" class="btn-audio" onclick="toggleAudio()">
    <span id="iconeAudio">II</span>
</div>

<!-- PÁGINA 3 (Já fica carregada no fundo para não ter atraso no final do vídeo) -->
<div class="page" id="page3" style="display:block; z-index: 1;">
    <div style="position: relative; width: 100%; height: 100%;">
        <img src="pagina3.jpg">
        <a class="hotspot" style="bottom:30%; left:16%; width:20%; height:10%;" href="https://maps.app.goo.gl/hWiUi8mzMRatotBe9?g_st=aw" target="_blank"></a>
        <a class="hotspot" style="bottom:30%; left:40%; width:20%; height:10%;" href="https://docs.google.com/forms/d/e/1FAIpQLSccUDorY1MvFhDgZeHmfwvUAWBfq1xzO2IJFuvPYztD1BmiGw/viewform?usp=sharing" target="_blank"></a>
        <div class="hotspot" style="bottom:30%; left:64%; width:20%; height:10%;" onclick="goPage(4)"></div>
    </div>
</div>

<!-- PÁGINA 2 (VÍDEO - Fica por cima da 3) -->
<div class="page" id="page2" style="z-index: 2;">
    <video id="video" src="pagina2.mp4" playsinline webkit-playsinline preload="auto"></video>
</div>

<!-- PÁGINA 1 (CAPA - Fica por cima de tudo no início) -->
<div class="page" id="page1" style="display:block; z-index: 3;">
    <div style="position: relative; width: 100%; height: 100%;" onclick="startInvite()">
        <img src="pagina1.jpg">
    </div>
</div>

<!-- PÁGINA 4 (EXTRAS) -->
<div class="page" id="page4" style="z-index: 4;">
    <div style="position: relative; width: 100%; height: 100%;">
        <img src="pagina4.jpg">
        <div class="btn-voltar" onclick="goPage(3)"></div>
    </div>
</div>

<script>
    const musica = document.getElementById('musica');
    const video = document.getElementById('video');
    const btnAudio = document.getElementById('btnControleAudio');
    const iconeAudio = document.getElementById('iconeAudio');

    // Pré-carrega o vídeo assim que abrir o site
    video.load();

    function startInvite() {
        // Toca a música
        musica.play().catch(() => {});
        btnAudio.style.display = 'flex';
        
        // Mostra a página do vídeo
        document.getElementById('page2').style.display = 'block';
        
        // Tenta dar play no vídeo
        const playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.then(() => {
                // SÓ ESCONDE A CAPA QUANDO O VÍDEO REALMENTE COMEÇAR (Evita tela preta no início)
                setTimeout(() => {
                    document.getElementById('page1').style.display = 'none';
                }, 100); 
            }).catch(error => {
                document.getElementById('page1').style.display = 'none';
            });
        }

        // Quando o vídeo estiver quase acabando ou acabar
        video.onended = () => {
            finalizarVideo();
        };

        video.ontimeupdate = () => {
            if (video.currentTime >= video.duration - 0.2) {
                finalizarVideo();
            }
        };
    }

    function finalizarVideo() {
        // Esconde o vídeo. Como a Página 3 já está "atrás" (z-index 1), ela aparece na hora.
        document.getElementById('page2').style.display = 'none';
        video.pause();
    }

    function toggleAudio() {
        if (musica.paused) {
            musica.play();
            iconeAudio.innerText = "II";
            btnAudio.style.animation = "pulse-white 2s infinite";
        } else {
            musica.pause();
            iconeAudio.innerText = "▶";
            btnAudio.style.animation = "none";
        }
    }

    function goPage(num) {
        // Esconde todas as camadas superiores para navegar
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page' + num).style.display = 'block';
    }
</script>

</body>
</html>
