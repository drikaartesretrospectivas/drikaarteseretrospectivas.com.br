<meta charset="UTF-8">

<title>Pedro</title>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #e9e9e9;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* Área de zoom */
#zoom-container {
  width: 95vw;
  max-width: 420px;
  height: calc(100vh - 70px);
  overflow: hidden;
  touch-action: none;
  position: relative;
  cursor: grab;
}
#zoom-container:active { cursor: grabbing; }

/* Flipbook */
#book {
  width: 100%;
  height: 100%;
  transform-origin: center center;
}

/* Páginas */
.page {
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
}
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}
.page video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}
/* Botões de navegação */
.controls {
  position: fixed;
  bottom: 12px;
  display: flex;
  gap: 20px;
  z-index: 10;
}
.controls button {
  border: none;
  background: #333;
  color: white;
  font-size: 20px;
  padding: 10px 22px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.controls button:active { background: #555; }

/* Indicador de zoom */
#zoom-badge {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.08em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
#zoom-badge.visible { opacity: 1; }

/* Botão reset zoom */
#zoom-reset {
  position: fixed;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  font-size: 13px;
  padding: 5px 11px;
  border-radius: 20px;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
#zoom-reset.visible { opacity: 1; pointer-events: auto; }

/* ══════════════════════════════════════
   BOTÃO DE MÚSICA
══════════════════════════════════════ */
#btn-music {
  position: fixed;
  top: 8px;
  left: 14px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  border: 2px solid rgba(255,255,255,0.5);
  color: white;
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: background 0.2s, opacity 0.2s;
  animation: musicPulse 1.6s ease-in-out infinite;
}
#btn-music:hover  { background: rgba(0,0,0,0.8); }
#btn-music.muted  { animation: none; opacity: 0.45; }

@keyframes musicPulse {
  0%   { box-shadow: 0 0 0  0px rgba(255,255,255,0.9); }
  70%  { box-shadow: 0 0 0 16px rgba(255,255,255,0.0); }
  100% { box-shadow: 0 0 0  0px rgba(255,255,255,0.0); }
}

/* ══════════════════════════════════════
   CAMADA DE HOTSPOTS
══════════════════════════════════════ */
#hotspot-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  transform-origin: center center;
}

.hotspot-group {
  display: none;
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.hotspot-group.active { display: block; }

.hotspot-btn {
  position: absolute;
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  border: none;
  cursor: pointer;
  /* ✏️ VISIBILIDADE DO HOTSPOT
     Invisível (produção)  → background: transparent;
     Visível  (calibrar)   → background: rgba(255,0,0,0.25); */
  background: transparent;
  border-radius: 40px;
  padding: 11px 20px;
  transition: background 0.2s;
  /* ✏️ BORDA E SOMBRA
     Invisível (produção)  → remova as 2 linhas abaixo
     Visível  (calibrar)   → descomente as 2 linhas abaixo */
  /* border: 1.5px solid rgba(255,255,255,0.45); */
  /* box-shadow: 0 4px 18px rgba(0,0,0,0.18); */
}
.hotspot-btn:active { transform: scale(0.97); }

/*
  ✏️ OUTLINE DE DEBUG — descomente para ver a área exata:
  .hotspot-btn { outline: 2px dashed red; }
*/
</style>
</head>
<body>

<!-- ══ BOTÃO DE MÚSICA ══ -->
<button id="btn-music" title="Som">♪</button>

<div id="zoom-container">
  <div id="book">
    <!-- ✏️ Adicione ou remova páginas aqui -->
    <div class="page"><img src="pages/1.jpg" alt="Página 1"></div>
    <div class="page"><img src="pages/2.jpg" alt="Página 2"></div>
    <div class="page"><img src="pages/3.jpg" alt="Página 3"></div>
    <div class="page"><img src="pages/4.jpg" alt="Página 4"></div>
    <div class="page"><img src="pages/5.jpg" alt="Página 5"></div>
    <div class="page"><img src="pages/6.jpg" alt="Página 6"></div>
    <div class="page"><img src="pages/7.jpg" alt="Página 7"></div>
    <div class="page"><img src="pages/8.jpg" alt="Página 8"></div>
    <div class="page">
      
</div>
  </div>

  <!-- ══ CAMADA DE HOTSPOTS ══ -->
  <div id="hotspot-layer">

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║   ✏️  HOTSPOTS — COMO CONFIGURAR                         ║
    ╠══════════════════════════════════════════════════════════╣
    ║  • data-page="5"  → página em que aparece               ║
    ║  • top / left / width → posição em % da página          ║
    ║  • href → link que abre ao clicar                       ║
    ║  • Para ver a área: descomente o outline no CSS         ║
    ╚══════════════════════════════════════════════════════════╝
    -->

    <!-- ✏️ Mude data-page para trocar de página -->
    <div class="hotspot-group" data-page="5">

      <!-- BOTÃO 1 — Confirmar Presença (WhatsApp) -->
      <a class="hotspot-btn"
         href="https://drikaarteseretrospectivas.com.br/confirmar-livrinho/"
         target="_blank"
         style="top: 41%; left: 2%; width: 96%;">
      </a>

      <!-- BOTÃO 2 — Ver Local (Google Maps) -->
      <a class="hotspot-btn"
         href="https://maps.app.goo.gl/TzgNt3Cvx5yhN1jcA"
         target="_blank"
         style="top: 54%; left: 2%; width: 96%;">
      </a>

    </div>

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  ✏️  MODELO PARA NOVA PÁGINA:                            ║
    ║                                                          ║
    ║  <div class="hotspot-group" data-page="NUMERO">          ║
    ║    <a class="hotspot-btn"                                ║
    ║       href="https://seu-link.com"                        ║
    ║       target="_blank"                                    ║
    ║       style="top: 45%; left: 2%; width: 96%;">           ║
    ║    </a>                                                  ║
    ║  </div>                                                  ║
    ╚══════════════════════════════════════════════════════════╝
    -->

  </div><!-- /hotspot-layer -->
</div><!-- /zoom-container -->

<div class="controls">
  <button id="prev">◀</button>
  <button id="next">▶</button>
</div>

<div id="zoom-badge">1×</div>
<button id="zoom-reset">✕ zoom</button>

<!--
  ✏️ ÁUDIO
  music.mp3 → música de fundo (toca em loop durante toda navegação)
  Coloque o arquivo na raiz do projeto com este nome.
-->
<audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

<script>
/* ============================================================
   FLIPBOOK
   ============================================================ */
const pageFlip = new St.PageFlip(
  document.getElementById("book"),
  {
    width: 400,
    height: 700,
    size: "stretch",
    minWidth: 300,
    maxWidth: 600,
    minHeight: 400,
    maxHeight: 900,
    maxShadowOpacity: 0.5,
    showCover: false,
    mobileScrollSupport: false,
    useMouseEvents: true,
  }
);

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

/* Botões de navegação — só funcionam fora do zoom */
document.getElementById("next").onclick = () => { if (scale === 1) pageFlip.flipNext(); };
document.getElementById("prev").onclick = () => { if (scale === 1) pageFlip.flipPrev(); };

/* ============================================================
   MÚSICA DE FUNDO
   — Arquivo: music.mp3 na raiz do projeto
   — Loop contínuo durante toda a navegação
   — NÃO reinicia ao virar página
   — Botão ♪ liga / 🔇 desliga
   ============================================================ */
const bgMusic      = document.getElementById("bgMusic");
const btnMusic     = document.getElementById("btn-music");
let   musicOn      = false;
let   musicStarted = false;

bgMusic.volume = 0.75; // ✏️ volume: 0.0 (mudo) → 1.0 (máximo)

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  bgMusic.play()
    .then(() => { musicOn = true; syncMusicBtn(); })
    .catch(() => {
      // Autoplay ainda bloqueado — será tentado novamente
      // no próximo gesto via onFirstInteraction
      musicStarted = false;
    });
}

function syncMusicBtn() {
  btnMusic.textContent = musicOn ? '♪' : '🔇';
  btnMusic.classList.toggle('muted', !musicOn);
}

btnMusic.addEventListener('click', () => {
  if (!musicStarted) { startMusic(); return; }
  if (musicOn) { bgMusic.pause(); musicOn = false; }
  else          { bgMusic.play();  musicOn = true;  }
  syncMusicBtn();
});

/* ============================================================
   AUTOPLAY — dispara no PRIMEIRO TOQUE na página 1
   ──────────────────────────────────────────────────────────
   Estratégia dupla:
   1. onFirstInteraction → qualquer toque na tela (mais rápido)
   2. pageFlip.on('flip') → virada da página 1 (garante o
      momento exato que o convite "abre")
   Ambos chamam startMusic(), que executa só uma vez.
   ============================================================ */
function onFirstInteraction() {
  startMusic();
  document.removeEventListener('touchstart', onFirstInteraction);
  document.removeEventListener('touchend',   onFirstInteraction);
  document.removeEventListener('mousedown',  onFirstInteraction);
  document.removeEventListener('keydown',    onFirstInteraction);
}

document.addEventListener('touchstart', onFirstInteraction, { passive: true });
document.addEventListener('touchend',   onFirstInteraction, { passive: true });
document.addEventListener('mousedown',  onFirstInteraction);
document.addEventListener('keydown',    onFirstInteraction);

/* ============================================================
   HOTSPOTS — mostra/oculta por página
   ============================================================ */
const hotspotGroups = document.querySelectorAll('.hotspot-group');

function updateHotspots(pageNumber) {
  hotspotGroups.forEach(g => {
    g.classList.toggle('active', parseInt(g.dataset.page, 10) === pageNumber);
  });
}

pageFlip.on('flip', (e) => {
  const pageNumber = e.data + 1; // page-flip usa índice 0-based

  // ── Inicia música na virada da página 1 (momento exato da abertura) ──
  if (pageNumber === 2) startMusic();

  updateHotspots(pageNumber);
});

updateHotspots(1); // página inicial

/* ============================================================
   ZOOM — pinch + duplo toque + arrastar
   ============================================================ */
const container = document.getElementById("zoom-container");
const book      = document.getElementById("book");
const badge     = document.getElementById("zoom-badge");
const resetBtn  = document.getElementById("zoom-reset");

const MIN_SCALE = 1;
const MAX_SCALE = 4;
const DBL_SCALE = 2.5;

let scale           = 1;
let posX            = 0;
let posY            = 0;
let isZoomed        = false;

let pinching        = false;
let pinchStartDist  = 0;
let pinchStartScale = 1;
let pinchOriginX    = 0;
let pinchOriginY    = 0;
let pinchStartPosX  = 0;
let pinchStartPosY  = 0;

let panning         = false;
let panStartX       = 0;
let panStartY       = 0;
let panOriginX      = 0;
let panOriginY      = 0;

let lastTapTime     = 0;
let lastTapX        = 0;
let lastTapY        = 0;

function getDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function getMid(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2,
  };
}

function clampPos(x, y, s) {
  const rect = container.getBoundingClientRect();
  const maxX =  (rect.width  * (s - 1)) / 2;
  const minX = -(rect.width  * (s - 1)) / 2;
  const maxY =  (rect.height * (s - 1)) / 2;
  const minY = -(rect.height * (s - 1)) / 2;
  return {
    x: Math.min(maxX, Math.max(minX, x)),
    y: Math.min(maxY, Math.max(minY, y)),
  };
}

function applyTransform(animate) {
  if (animate) {
    book.style.transition = 'transform 0.3s ease';
    setTimeout(() => { book.style.transition = ''; }, 320);
  } else {
    book.style.transition = '';
  }
  book.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;

  const show = scale > 1.05;
  badge.textContent = scale.toFixed(1).replace('.0', '') + '×';
  badge.classList.toggle('visible', show);
  resetBtn.classList.toggle('visible', show);
  isZoomed = show;

  if (show) { pageFlip.disable(); } else { pageFlip.enable(); }

  // Sincroniza hotspots com o zoom
  const layer = document.getElementById('hotspot-layer');
  if (layer) {
    layer.style.transform     = book.style.transform;
    layer.style.pointerEvents = show ? 'none' : '';
  }
}

function resetZoom(animate = true) {
  scale = 1; posX = 0; posY = 0;
  applyTransform(animate);
}

resetBtn.addEventListener('click', () => resetZoom(true));

/* ── TOUCHSTART ── */
container.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    pinching        = true;
    panning         = false;
    pinchStartDist  = getDist(e.touches);
    pinchStartScale = scale;
    pinchStartPosX  = posX;
    pinchStartPosY  = posY;
    const mid  = getMid(e.touches);
    const rect = container.getBoundingClientRect();
    pinchOriginX = mid.x - rect.left - rect.width  / 2;
    pinchOriginY = mid.y - rect.top  - rect.height / 2;
  } else if (e.touches.length === 1 && isZoomed) {
    panning    = true;
    panStartX  = e.touches[0].clientX;
    panStartY  = e.touches[0].clientY;
    panOriginX = posX;
    panOriginY = posY;
  }
}, { passive: false });

/* ── TOUCHMOVE ── */
container.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinching) {
    e.preventDefault();
    const newDist  = getDist(e.touches);
    const ratio    = newDist / pinchStartDist;
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale * ratio));
    const delta    = newScale / scale;
    posX  = pinchOriginX + delta * (pinchStartPosX - pinchOriginX);
    posY  = pinchOriginY + delta * (pinchStartPosY - pinchOriginY);
    scale = newScale;
    const c = clampPos(posX, posY, scale);
    posX = c.x; posY = c.y;
    applyTransform(false);
  } else if (e.touches.length === 1 && panning && isZoomed) {
    e.preventDefault();
    const c = clampPos(
      panOriginX + e.touches[0].clientX - panStartX,
      panOriginY + e.touches[0].clientY - panStartY,
      scale
    );
    posX = c.x; posY = c.y;
    applyTransform(false);
  }
}, { passive: false });

/* ── TOUCHEND ── */
container.addEventListener('touchend', e => {
  if (e.touches.length < 2 && pinching) {
    pinching = false;
    if (scale < 1.1) resetZoom(true);
  }
  if (e.touches.length === 0) panning = false;

  if (e.changedTouches.length === 1) {
    const now = Date.now();
    const t   = e.changedTouches[0];
    const dt  = now - lastTapTime;
    const dx  = Math.abs(t.clientX - lastTapX);
    const dy  = Math.abs(t.clientY - lastTapY);

    if (dt < 300 && dx < 30 && dy < 30) {
      if (isZoomed) {
        resetZoom(true);
      } else {
        const rect = container.getBoundingClientRect();
        const ox   = t.clientX - rect.left - rect.width  / 2;
        const oy   = t.clientY - rect.top  - rect.height / 2;
        scale = DBL_SCALE;
        posX  = ox - DBL_SCALE * ox;
        posY  = oy - DBL_SCALE * oy;
        const c = clampPos(posX, posY, scale);
        posX = c.x; posY = c.y;
        applyTransform(true);
      }
      lastTapTime = 0;
      return;
    }
    lastTapTime = now;
    lastTapX    = t.clientX;
    lastTapY    = t.clientY;
  }
}, { passive: true });
</script>
</body>
</html>
