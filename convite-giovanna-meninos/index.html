<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Convite Giovanna Segurança</title>

    <style>
        :root {
            --cor-botao: #ffffff;
            --aspect-ratio: 9 / 16;
            --tempo-transicao: 0.8s; /* Velocidade do fade */
        }

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONFIGURAÇÃO DE TRANSIÇÃO */
        .page {
            display: none;
            width: 100%;
            height: 100dvh;
            position: absolute; /* Mudado para absolute para sobrepor durante o fade */
            max-width: 500px;
            opacity: 0;
            transition: opacity var(--tempo-transicao) ease-in-out;
            z-index: 1;
        }

        .page.active {
            display: block;
            opacity: 1;
            z-index: 2;
        }

        /* 🔴 MODO EDIÇÃO */
        body.modo-edicao .hotspot {
            border: 2px dashed red;
            background: rgba(255,0,0,0.2);
        }

        .content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img,
        .media-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .interactive-area {
            position: absolute;
            aspect-ratio: var(--aspect-ratio);
            height: 100%;
            max-width: 100%;
        }

        .btn-audio {
            position: fixed;
            top: env(safe-area-inset-top, 30px);
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.5);
            border: 2px solid #ffffff;
            color: #ffffff;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 18px;
            animation: pulse-white 2s infinite;
        }

        /* Novo: Estilo para o Botão Fechar (X) da Página 4 */
        .btn-fechar {
            position: absolute;
            top: 20px; /* Distância do topo dentro da área interativa */
            right: 20px; /* Distância da direita dentro da área interativa */
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.6);
            border: 2px solid #ffffff;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            font-size: 20px;
            font-weight: bold;
            pointer-events: auto; /* Garante que o clique funcione */
        }

        @keyframes pulse-white {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255,255,255,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>

<body>

<audio id="musica" src="audio.mp3" loop preload="auto"></audio>

<div id="btnControleAudio" class="btn-audio" onclick="toggleAudio()">
    <span id="iconeAudio">▶</span>
</div>

<div class="page active" id="page1">
    <div class="content-wrapper" onclick="startInvite()">
        <div class="media-container">
            <img src="pagina1.jpg">
            <div class="interactive-area">
                <div class="hotspot" style="top:0; left:0; width:100%; height:100%;"></div>
            </div>
        </div>
    </div>
</div>

<div class="page" id="page2">
    <div class="content-wrapper">
        <div class="media-container">
            <video id="video" src="pagina2.mp4" playsinline webkit-playsinline muted preload="auto"></video>
        </div>
    </div>
</div>

<div class="page" id="page3">
    <div class="content-wrapper">
        <div class="media-container">
            <img src="pagina3.jpg">
            <div class="interactive-area">
                <div class="hotspot" 
                   style="top:63%; left:50%; width:40%; height:10%; transform:translateX(-50%);" 
                   onclick="goPage(4)">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="page" id="page4">
    <div class="content-wrapper">
        <div class="media-container">
            <img src="pagina4.jpg">
            <div class="interactive-area">
                <div class="btn-fechar" onclick="goPage(3)">✕</div>
            </div>
        </div>
    </div>
</div>

<script>
    const musica = document.getElementById('musica');
    const video = document.getElementById('video');
    const btnAudio = document.getElementById('btnControleAudio');
    const iconeAudio = document.getElementById('iconeAudio');

    function startInvite() {
        musica.play().catch(e => console.log("Audio play blocked"));
        btnAudio.style.display = 'flex';
        iconeAudio.innerText = "II";

        goPage(2);
        video.play();

        video.onended = () => {
            goPage(3);
        };
    }

    function toggleAudio() {
        if (musica.paused) {
            musica.play();
            iconeAudio.innerText = "II";
            btnAudio.style.animation = "pulse-white 2s infinite";
        } else {
            musica.pause();
            iconeAudio.innerText = "▶";
            btnAudio.style.animation = "none";
        }
    }

    // Função goPage preservada, adicionado o tratamento de tempo para garantir o fade
    function goPage(num) {
        const pages = document.querySelectorAll('.page');
        const targetPage = document.getElementById('page' + num);

        // Remove a classe ativa de todas as páginas
        pages.forEach(p => {
            p.classList.remove('active');
            // Timeout para esconder o display após o fade out. 
            // Usamos 800ms para casar com a variável CSS --tempo-transicao
            setTimeout(() => { 
                if(!p.classList.contains('active')) {
                    p.style.display = 'none'; 
                }
            }, 800);
        });

        // Ativa a nova página
        if (targetPage) {
            targetPage.style.display = 'block';
            // Pequeno delay para o browser processar o display:block antes da opacidade
            // Isso é vital para o efeito de fade funcionar
            setTimeout(() => {
                targetPage.classList.add('active');
            }, 50); // Aumentado levemente para maior estabilidade
        }
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && !musica.paused) {
            musica.play();
        }
    });
</script>

</body>
</html>
