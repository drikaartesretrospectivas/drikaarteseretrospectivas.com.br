<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Giovanna 15 anos</title>

    <style>
        :root {
            --cor-botao: #ffffff;
            --aspect-ratio: 9 / 16;
            --tempo-transicao: 0.8s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* AJUSTE NA TRANSIÇÃO */
        .page {
            position: absolute;
            width: 100%;
            height: 100dvh;
            max-width: 500px;
            opacity: 0;
            visibility: hidden; /* Substitui o display:none para evitar bugs de carregamento */
            transition: opacity var(--tempo-transicao) ease-in-out;
            z-index: 1;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }

        .content-wrapper, .media-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .media-container img,
        .media-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .interactive-area {
            position: absolute;
            aspect-ratio: var(--aspect-ratio);
            height: 100%;
            width: auto;
        }

        .btn-audio {
            position: fixed;
            top: env(safe-area-inset-top, 30px);
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.5);
            border: 2px solid #ffffff;
            color: #ffffff;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 18px;
            animation: pulse-white 2s infinite;
        }

        .btn-fechar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.6);
            border: 2px solid #ffffff;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            font-size: 20px;
        }

        @keyframes pulse-white {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255,255,255,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

<audio id="musica" src="audio.mp3" loop preload="auto"></audio>

<div id="btnControleAudio" class="btn-audio" onclick="toggleAudio()">
    <span id="iconeAudio">▶</span>
</div>

<div class="page active" id="page1">
    <div class="content-wrapper" onclick="startInvite()">
        <div class="media-container">
            <img src="pagina1.jpg" alt="Página 1">
            <div class="interactive-area">
                <div class="hotspot" style="top:0; left:0; width:100%; height:100%;"></div>
            </div>
        </div>
    </div>
</div>

<div class="page" id="page2">
    <div class="content-wrapper">
        <div class="media-container">
            <video id="video" src="pagina2.mp4" playsinline muted preload="auto"></video>
        </div>
    </div>
</div>

<div class="page" id="page3">
    <div class="content-wrapper">
        <div class="media-container">
            <img src="pagina3.jpg" alt="Página 3">
            <div class="interactive-area">
                <div class="hotspot" style="top:63%; left:50%; width:40%; height:10%; transform:translateX(-50%);" onclick="goPage(4)"></div>
            </div>
        </div>
    </div>
</div>

<div class="page" id="page4">
    <div class="content-wrapper">
        <div class="media-container">
            <img src="pagina4.jpg" alt="Página 4">
            <div class="interactive-area">
                <div class="btn-fechar" onclick="goPage(3)">✕</div>
            </div>
        </div>
    </div>
</div>

<script>
    const musica = document.getElementById('musica');
    const video = document.getElementById('video');
    const btnAudio = document.getElementById('btnControleAudio');
    const iconeAudio = document.getElementById('iconeAudio');

    function startInvite() {
        musica.play().catch(e => console.log("Erro ao tocar áudio"));
        btnAudio.style.display = 'flex';
        iconeAudio.innerText = "II";
        goPage(2);
        video.play();

        video.onended = () => {
            goPage(3);
        };
    }

    function toggleAudio() {
        if (musica.paused) {
            musica.play();
            iconeAudio.innerText = "II";
            btnAudio.style.animation = "pulse-white 2s infinite";
        } else {
            musica.pause();
            iconeAudio.innerText = "▶";
            btnAudio.style.animation = "none";
        }
    }

    function goPage(num) {
        const pages = document.querySelectorAll('.page');
        const targetPage = document.getElementById('page' + num);

        if (!targetPage) return;

        // Primeiro, remove a classe active de todas
        pages.forEach(p => p.classList.remove('active'));

        // Adiciona active na página desejada
        targetPage.classList.add('active');
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && !musica.paused) {
            musica.play();
        }
    });
</script>

</body>
</html>
